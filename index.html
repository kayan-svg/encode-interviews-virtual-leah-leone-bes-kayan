<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Call</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FFFAF5;
    color: #011F2E;
  }
  .container {
    text-align: center;
    padding: 2rem;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 2rem;
  }
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-width: 280px;
    margin: 0 auto;
  }
  a.btn {
    display: block;
    padding: 1rem 2rem;
    background: #011F2E;
    color: #FFFAF5;
    text-decoration: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: 500;
    transition: background 0.2s;
  }
  a.btn:hover { background: #FF4D1C; }
</style>
</head>
<body>
  <div class="container">
    <h1>Book a Call with the Pillar Team</h1>
    <div class="buttons">
      <a class="btn" href="https://calendar.app.google/7Z8HDGiXM1qXtkfP6" target="_blank">Leah</a>
      <a class="btn" href="https://calendar.google.com/calendar/u/0/appointments/schedules/AcZssZ0Zd7iolLRUGn9SlzNg0IgoE0OQY4Ujldq7YPOx5LTQGLD0-q_i56AOJOnkgTqLBhe-4VXT9TI7" target="_blank">Leone</a>
      <a class="btn" href="https://calendar.app.google/Rs7CiHH9m7HcAinv7" target="_blank">Kayan</a>
    </div>
  </div>
</body>
</html>
